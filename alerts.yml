# Prometheus alerting rules for production monitoring
groups:
  - name: app_alerts
    interval: 30s
    rules:
      # Alert when error rate exceeds 5% over 5 minutes
      - alert: HighErrorRate
        expr: |
          (sum(rate(fastapi_errors_total[5m])) / sum(rate(fastapi_requests_total[5m]))) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'High error rate detected'
          description: 'Error rate is {{ $value | humanizePercentage }} over last 5 minutes'

      # Alert when FastAPI service is down
      - alert: ServiceDown
        expr: up{job="fastapi"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'FastAPI service is down'
          description: 'FastAPI service has been unreachable for more than 1 minute'

      # Alert when request latency is high
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(fastapi_request_duration_seconds_bucket[5m])) by (le)) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High request latency detected'
          description: 'P95 latency is {{ $value | humanizeDuration }} over last 5 minutes'

      # Alert when too many active requests
      - alert: HighMemory
        expr: fastapi_active_requests > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'High number of active requests'
          description: 'Currently {{ $value }} active requests, threshold is 100'

      # Alert when Prometheus itself is down
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Prometheus monitoring is down'
          description: 'Prometheus has been unreachable for more than 1 minute'
